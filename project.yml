name: InstaAlerter
options:
  bundleIdPrefix: com.jaypreak
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

targets:
  InstaAlerter:
    type: application
    platform: iOS
    sources:
      - InstaAlerter
    info:
      path: InstaAlerter/Info.plist
      properties:
        UILaunchScreen: {}
        BGTaskSchedulerPermittedIdentifiers:
          - com.instaalerter.refresh
        UIBackgroundModes:
          - fetch
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jaypreak.InstaAlerter
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
